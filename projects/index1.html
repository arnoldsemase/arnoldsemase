<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Image Converter & Resizer with Undo/Redo</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 0;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px; margin: auto; padding: 20px;
        }
        h1 {
            text-align: center; color: #333;
        }
        form {
            background: #fff; padding: 20px; border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .form-group {
            display: flex; flex-wrap: wrap; margin-bottom: 15px;
        }
        .form-group label {
            flex: 1 0 150px; margin-right: 10px; font-weight: bold;
        }
        .form-group input, .form-group select {
            flex: 2 0 calc(100% - 160px); padding: 8px; border: 1px solid #ccc; border-radius: 4px;
        }
        .form-group input[type="checkbox"] {
            flex: 0; margin-top: 5px;
        }
        .btn-group {
            text-align: center; margin-top: 20px;
        }
        .btn {
            padding: 10px 20px; background-color: #007bff; color: white; border: none;
            cursor: pointer; margin: 5px; border-radius: 4px;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .preview {
            margin-top: 20px; text-align: center;
        }
        .image-preview {
            max-width: 100%; height: auto; display: inline-block;
            border: 1px solid #ccc; padding: 10px; background: #fff;
        }
        #compressionValue {
            display: inline-block; width: 30px; text-align: center;
        }
        .hidden {
            display: none;
        }
        /* Drag and Drop Styles */
        .upload-area {
            border: 2px dashed #ccc; padding: 20px; text-align: center;
            border-radius: 5px; background-color: #fafafa; cursor: pointer;
        }
        .upload-area.hover {
            border-color: #007bff; background-color: #e9f5ff;
        }
        .upload-area img {
            max-width: 100px; margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Advanced Image Converter & Resizer with Undo/Redo</h1>
        <form id="imageForm">
            <div class="form-group">
                <label for="image">Upload an image:</label>
                <div class="upload-area" id="uploadArea">
                    <p>Drag & Drop Image Here or Click to Upload</p>
                    <input type="file" id="image" name="image" accept="image/*" required class="hidden">
                    <img id="thumbnail" src="#" alt="Thumbnail" class="hidden">
                </div>
            </div>
            <div class="form-group">
                <label for="width">Width (px):</label>
                <input type="number" id="width" name="width" placeholder="Optional" min="1">
            </div>
            <div class="form-group">
                <label for="height">Height (px):</label>
                <input type="number" id="height" name="height" placeholder="Optional" min="1">
            </div>
            <div class="form-group">
                <label for="aspectRatio">Lock Aspect Ratio:</label>
                <input type="checkbox" id="aspectRatio" name="aspectRatio">
            </div>
            <div class="form-group">
                <label for="format">Convert to:</label>
                <select id="format" name="format">
                    <option value="jpeg">JPEG</option>
                    <option value="png">PNG</option>
                    <option value="gif">GIF</option>
                </select>
            </div>
            <div class="form-group">
                <label for="compression">Compression Quality:</label>
                <input type="range" id="compression" name="compression" min="0" max="100" value="80">
                <span id="compressionValue">80</span>%
            </div>
            <div class="form-group">
                <label for="filename">Output Filename:</label>
                <input type="text" id="filename" name="filename" placeholder="Optional">
            </div>
            <div class="form-group">
                <label for="bwFilter">Black & White:</label>
                <input type="checkbox" id="bwFilter" name="bwFilter">
            </div>
            <div class="form-group">
                <label for="rotation">Rotation:</label>
                <select id="rotation" name="rotation">
                    <option value="0">0°</option>
                    <option value="90">90°</option>
                    <option value="180">180°</option>
                    <option value="270">270°</option>
                </select>
            </div>
            <div class="form-group">
                <label for="text">Text on Image:</label>
                <input type="text" id="text" name="text" placeholder="Enter your text">
            </div>
            <div class="form-group">
                <label for="fontSize">Font Size (px):</label>
                <input type="number" id="fontSize" name="fontSize" value="30" min="10">
            </div>
            <div class="form-group">
                <label for="textColor">Text Color:</label>
                <input type="color" id="textColor" name="textColor" value="#000000">
            </div>
            <div class="form-group">
                <label for="textPositionX">Text Position X (px):</label>
                <input type="number" id="textPositionX" name="textPositionX" value="50">
            </div>
            <div class="form-group">
                <label for="textPositionY">Text Position Y (px):</label>
                <input type="number" id="textPositionY" name="textPositionY" value="50">
            </div>
            <div class="btn-group">
                <button type="button" class="btn" onclick="downloadImage()">Download Image</button>
                <button type="button" class="btn" onclick="undo()">Undo</button>
                <button type="button" class="btn" onclick="redo()">Redo</button>
            </div>
        </form>
        <div class="preview" id="preview">
            <h3>Image Preview:</h3>
            <img id="imagePreview" class="image-preview" alt="Preview will appear here">
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('image');
        const previewImage = document.getElementById('imagePreview');
        const widthInput = document.getElementById('width');
        const heightInput = document.getElementById('height');
        const formatSelect = document.getElementById('format');
        const aspectRatioCheckbox = document.getElementById('aspectRatio');
        const compressionInput = document.getElementById('compression');
        const compressionValue = document.getElementById('compressionValue');
        const filenameInput = document.getElementById('filename');
        const bwFilterCheckbox = document.getElementById('bwFilter');
        const rotationSelect = document.getElementById('rotation');
        const textInput = document.getElementById('text');
        const fontSizeInput = document.getElementById('fontSize');
        const textColorInput = document.getElementById('textColor');
        const textPositionXInput = document.getElementById('textPositionX');
        const textPositionYInput = document.getElementById('textPositionY');
        const previewContainer = document.getElementById('preview');
        const uploadArea = document.getElementById('uploadArea');
        const thumbnail = document.getElementById('thumbnail');

        let img = new Image();
        let aspectRatio = 1;
        let currentCanvasData = null;

        // History stack for Undo/Redo
        const history = [];
        let historyIndex = -1;

        // Update compression value display
        compressionInput.addEventListener('input', function() {
            compressionValue.textContent = compressionInput.value;
        });

        // Drag and Drop functionality
        ['dragenter', 'dragover'].forEach(eventName => {
            uploadArea.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
                uploadArea.classList.add('hover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
                uploadArea.classList.remove('hover');
            }, false);
        });

        uploadArea.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                handleFile(files[0]);
            }
        });

        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                handleFile(file);
            }
        });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                img.src = e.target.result;
                img.onload = function() {
                    aspectRatio = img.width / img.height;
                    widthInput.value = img.width;
                    heightInput.value = img.height;
                    updatePreview(true);
                    displayThumbnail(img.src);
                }
            };
            reader.readAsDataURL(file);
        }

        function displayThumbnail(src) {
            thumbnail.src = src;
            thumbnail.classList.remove('hidden');
        }

        function updatePreview(saveHistory = true) {
            if (!img.src) return;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            let newWidth = parseInt(widthInput.value) || img.width;
            let newHeight = parseInt(heightInput.value) || img.height;

            if (aspectRatioCheckbox.checked) {
                newHeight = newWidth / aspectRatio;
                heightInput.value = Math.round(newHeight);
            }

            const rotation = parseInt(rotationSelect.value, 10);

            // Adjust canvas size based on rotation
            if (rotation % 180 === 0) {
                canvas.width = newWidth;
                canvas.height = newHeight;
            } else {
                canvas.width = newHeight;
                canvas.height = newWidth;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();

            // Apply rotation
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(rotation * Math.PI / 180);

            // Draw image
            ctx.drawImage(img, -newWidth / 2, -newHeight / 2, newWidth, newHeight);
            ctx.restore();

            // Apply Black & White filter
            if (bwFilterCheckbox.checked) {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                    data[i] = data[i + 1] = data[i + 2] = avg;
                }
                ctx.putImageData(imageData, 0, 0);
            }

            // Add text if provided
            if (textInput.value.trim()) {
                ctx.font = `${fontSizeInput.value}px Arial`;
                ctx.fillStyle = textColorInput.value;
                ctx.fillText(textInput.value, parseInt(textPositionXInput.value), parseInt(textPositionYInput.value));
            }

            currentCanvasData = canvas.toDataURL('image/' + formatSelect.value, compressionInput.value / 100);
            previewImage.src = currentCanvasData;
            previewContainer.style.display = 'block';

            // Save to history if required
            if (saveHistory) {
                saveState(currentCanvasData);
            }
        }

        function saveState(dataUrl) {
            // Trim history if we've undone and then made a new change
            if (historyIndex < history.length - 1) {
                history.splice(historyIndex + 1);
            }
            history.push(dataUrl);
            historyIndex = history.length - 1;
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                previewImage.src = history[historyIndex];
                currentCanvasData = history[historyIndex];
            } else {
                alert('No more undo steps available.');
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                previewImage.src = history[historyIndex];
                currentCanvasData = history[historyIndex];
            } else {
                alert('No more redo steps available.');
            }
        }

        // Event Listeners
        const inputs = [
            widthInput, heightInput, formatSelect, aspectRatioCheckbox, compressionInput,
            bwFilterCheckbox, rotationSelect, textInput, fontSizeInput, textColorInput,
            textPositionXInput, textPositionYInput
        ];

        inputs.forEach(input => {
            input.addEventListener('input', () => updatePreview(true));
        });

        function downloadImage() {
            if (!currentCanvasData) {
                alert('Please upload and process an image first.');
                return;
            }
            const link = document.createElement('a');
            link.href = currentCanvasData;
            link.download = filenameInput.value || `converted-image.${formatSelect.value}`;
            link.click();
        }
    </script>
</body>
</html>
