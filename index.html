<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ClipSync X</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<canvas id="particles"></canvas>
<div class="aurora a1"></div>
<div class="aurora a2"></div>
<div class="aurora a3"></div>
<div class="spotlight"></div>

<header>
<h1>ClipSync X</h1>
<div class="badge">NETWORK ONLINE</div>
</header>

<section class="metrics">
<div><h2>99.99%</h2><p>UPTIME</p></div>
<div><h2>AES‑256</h2><p>SECURITY</p></div>
<div><h2>12ms</h2><p>LATENCY</p></div>
<div><h2>GLOBAL</h2><p>NODES</p></div>
</section>

<main>
<div class="card">
<h3>Deploy Payload</h3>
<textarea placeholder="Paste text here..."></textarea>
<button id="generate">Generate Access Code</button>
<div id="tokens" class="tokens"></div>
</div>

<div class="core">
<div class="ring r1"></div>
<div class="ring r2"></div>
<div class="ring r3"></div>
<div class="hub">◎</div>
</div>

<div class="card">
<h3>Recover Payload</h3>
<input placeholder="Enter code">
<button>Fetch Payload</button>
<pre class="terminal">Waiting for payload...</pre>
</div>
</main>

<script src="script.js"></script>
</body>
</html>
